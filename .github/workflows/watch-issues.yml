name: "Watch: Monitor Issues for New Image Requests"

on:
  schedule:
    # 每小时整点运行
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行（只检测 issue，不 dispatch）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: self-hosted
    container:
      image: python:3.11
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process issue events
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/watch/process_issue_events.py

      - name: Commit state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/dispatched_issues.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update dispatched issues state [skip ci]"
            git push
          fi

      - name: Report status
        if: always()
        run: echo "✅ Issue monitoring cycle completed"
