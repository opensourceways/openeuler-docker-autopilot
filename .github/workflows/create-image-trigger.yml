name: "create-image: 新增上游软件包镜像"

on:
  repository_dispatch:
    types: [create-image]

# 同一个软件包串行，避免并发冲突
concurrency:
  group: create-image-${{ github.event.client_payload.package_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ── AI 后端配置 ──────────────────────────────────────────────────
  # AI_RUNNER: opencode（默认）/ claude-code / claude-code-account
  AI_RUNNER:        ${{ vars.AI_RUNNER || 'opencode' }}
  # opencode 默认用 deepseek；claude-code 时填 claude-sonnet-4-6 等
  AI_MODEL:         ${{ vars.AI_MODEL || 'deepseek/deepseek-v4-pro' }}
  AI_TIMEOUT_MS:    ${{ vars.AI_TIMEOUT_MS || '1800000' }}
  # DeepSeek / OpenAI 兼容 API
  OPENAI_API_KEY:   ${{ secrets.AI_API_KEY || '' }}
  DEEPSEEK_API_KEY: ${{ secrets.AI_API_KEY || '' }}
  OPENAI_BASE_URL:  ${{ vars.OPENAI_BASE_URL || '' }}

  # ── 任务参数（来自 dispatch payload）────────────────────────────
  PACKAGE_NAME:     ${{ github.event.client_payload.package_name }}
  SOURCE_REPO_URL:  ${{ github.event.client_payload.source_repo_url }}
  DOMAIN:           ${{ github.event.client_payload.domain }}
  CATEGORY:         ${{ github.event.client_payload.category }}
  OS_VERSION:       ${{ vars.OS_VERSION || '24.03-lts-sp3' }}
  OS_TAG:           ${{ vars.OS_TAG || 'oe2403sp3' }}
  SOURCE_REPO:      ${{ github.event.client_payload.repo }}
  FORK_REPO:        ${{ github.event.client_payload.fork_repo }}
  BASE_BRANCH:      ${{ github.event.client_payload.base_branch || 'master' }}
  ISSUE_NUMBER:     ${{ github.event.client_payload.issue_number }}
  DONE_LABEL:       ${{ github.event.client_payload.done_label || 'image-created' }}
  CREATING_LABEL:   ${{ github.event.client_payload.creating_label || 'image-creating' }}
  GITCODE_TOKEN:    ${{ secrets.GITCODE_TOKEN }}
  GIT_USER_NAME:    ${{ vars.GIT_COMMIT_NAME || 'github-actions[bot]' }}
  GIT_USER_EMAIL:   ${{ vars.GIT_COMMIT_EMAIL || 'github-actions[bot]@users.noreply.github.com' }}

jobs:
  create-image:
    runs-on: self-hosted
    container:
      image: python:3.11
    timeout-minutes: 60

    steps:
      # ── 1. Checkout workflow repo ──────────────────────────────────
      - name: Checkout create-docker-images-workflow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Clone openeuler-docker-images fork ─────────────────────
      - name: Clone openeuler-docker-images fork
        run: |
          git clone --depth=1 \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${FORK_REPO}.git \
            image-repo
          cd image-repo
          git config user.name  "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      # ── 3. Install Python dependencies ───────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Setup Claude Code 账号凭据（仅 claude-code-account）──
      - name: Setup Claude Code account credentials
        if: env.AI_RUNNER == 'claude-code-account'
        env:
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.claude
          echo "$CLAUDE_CREDENTIALS_JSON" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json

      # ── 5. Install Node.js + AI Agent ────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AI Agent
        run: |
          if [ "$AI_RUNNER" = "claude-code-account" ]; then
            npm install -g @anthropic-ai/claude-code
            claude --version
          else
            npm install -g opencode-ai
            opencode --version
          fi

      # ── 6. Run image creation via AI Agent ───────────────────────
      - name: Create image files
        id: create_image
        env:
          IMAGE_REPO_DIR: ${{ github.workspace }}/image-repo
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: python scripts/stages/create-image.py

      # ── 7. Git: commit & push to new branch ──────────────────────
      - name: Commit and push to new branch
        if: steps.create_image.outputs.success == 'true'
        id: git_push
        run: |
          cd image-repo
          BRANCH="add-${{ steps.create_image.outputs.package_name }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH"

          # 移除 AI 工作产物
          for pattern in ".claude" ".opencode" "__pycache__" "ai-result.json"; do
            find . -name "$pattern" -not -path "./.git/*" -exec rm -rf {} + 2>/dev/null || true
          done

          git add ${CATEGORY}/
          git status

          git commit -m "Feat: add ${{ steps.create_image.outputs.package_name }} ${{ steps.create_image.outputs.version }} docker image on openEuler ${OS_VERSION^^}"

          git remote set-url origin \
            https://oauth2:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${FORK_REPO}.git
          git push origin "$BRANCH"
          echo "✅ Pushed branch $BRANCH"

      # ── 8. Create PR on GitCode ───────────────────────────────────
      - name: Create Pull Request
        if: steps.create_image.outputs.success == 'true'
        id: create_pr
        env:
          BRANCH:       ${{ steps.git_push.outputs.branch }}
          VERSION:      ${{ steps.create_image.outputs.version }}
          PACKAGE_NAME: ${{ steps.create_image.outputs.package_name }}
        run: |
          python - <<'EOF'
          import os, sys, requests

          GITCODE_BASE = "https://gitcode.com"
          token       = os.environ['GITCODE_TOKEN']
          source_repo = os.environ['SOURCE_REPO']
          fork_repo   = os.environ['FORK_REPO']
          base_branch = os.environ['BASE_BRANCH']
          branch      = os.environ['BRANCH']
          pkg         = os.environ['PACKAGE_NAME']
          version     = os.environ['VERSION']
          category    = os.environ['CATEGORY']
          source_url  = os.environ['SOURCE_REPO_URL']
          issue_num   = os.environ['ISSUE_NUMBER']
          os_ver      = os.environ['OS_VERSION']

          _parts = source_repo.rstrip('/').split('/')
          owner, name = _parts[-2], _parts[-1]
          fork_owner  = fork_repo.split('/')[0]

          title = f"Feat: add {pkg} {version} docker image on openEuler {os_ver.upper()}"
          body  = (
              f"## Summary\n"
              f"- Add **{pkg} v{version}** upstream package under `{category}/{pkg}/`\n"
              f"- Source repository: {source_url}\n"
              f"- Supports amd64 and arm64 architectures on openEuler {os_ver}\n\n"
              f"## Test plan\n"
              f"- [ ] Verify Dockerfile builds successfully on amd64\n"
              f"- [ ] Verify Dockerfile builds successfully on arm64\n\n"
              f"Closes #{issue_num}\n\n"
              f"> 🤖 Auto-generated by [create-docker-images-workflow]"
          )

          head = f"{fork_owner}:{branch}"
          url  = f"{GITCODE_BASE}/api/v5/repos/{owner}/{name}/pulls"
          resp = requests.post(url,
                               params={'access_token': token},
                               json={'title': title, 'body': body,
                                     'head': head, 'base': base_branch},
                               timeout=30)
          if resp.ok:
              pr = resp.json()
              pr_url = pr.get('html_url') or pr.get('url', '')
              print(f"✅ PR created: {pr_url}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"pr_url={pr_url}\n")
                  f.write(f"pr_number={pr.get('number', '')}\n")
          elif 'already exists' in resp.text.lower() or resp.status_code == 409:
              print("✅ PR already exists")
          else:
              print(f"❌ PR creation failed HTTP {resp.status_code}: {resp.text[:300]}")
              sys.exit(1)
          EOF

      # ── 9. Comment on GitCode issue ───────────────────────────────
      - name: Comment on issue
        if: always() && env.ISSUE_NUMBER != ''
        env:
          PR_URL:       ${{ steps.create_pr.outputs.pr_url }}
          SUCCESS:      ${{ steps.create_image.outputs.success }}
          PACKAGE_NAME: ${{ steps.create_image.outputs.package_name || env.PACKAGE_NAME }}
        run: |
          python - <<'EOF'
          import os, requests

          GITCODE_BASE = "https://gitcode.com"
          token       = os.environ['GITCODE_TOKEN']
          source_repo = os.environ['SOURCE_REPO']
          issue_num   = int(os.environ['ISSUE_NUMBER'])
          pr_url      = os.environ.get('PR_URL', '')
          success     = os.environ.get('SUCCESS', 'false') == 'true'
          pkg         = os.environ['PACKAGE_NAME']
          run_url     = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          _parts = source_repo.rstrip('/').split('/')
          owner, name = _parts[-2], _parts[-1]

          if success and pr_url:
              body = (
                  f"🤖 已自动为 **{pkg}** 创建 PR：{pr_url}\n\n"
                  f"请 review 后合并，或根据需要调整 Dockerfile 内容。"
              )
              done_label = os.environ.get('DONE_LABEL', 'image-created')
              requests.post(
                  f"{GITCODE_BASE}/api/v5/repos/{owner}/{name}/issues/{issue_num}/labels",
                  params={'access_token': token},
                  json=[done_label], timeout=30,
              )
          else:
              body = (
                  f"⚠️ 自动创建 **{pkg}** 镜像文件失败，请查看 "
                  f"[workflow 日志]({run_url}) 了解详情，或手动创建。"
              )

          url  = f"{GITCODE_BASE}/api/v5/repos/{owner}/{name}/issues/{issue_num}/comments"
          resp = requests.post(url, params={'access_token': token}, json={'body': body}, timeout=30)
          if resp.ok:
              print(f"✅ Comment posted on issue #{issue_num}")
          else:
              print(f"⚠️  Comment failed HTTP {resp.status_code}: {resp.text[:200]}")
          EOF

      # ── 10. Mark failed ───────────────────────────────────────────
      - name: Mark failed
        if: failure()
        run: echo "⚠️ create-image failed for $PACKAGE_NAME, check workflow logs"
